name: Daily Xpra AppImage Build

on:
  schedule:
    - cron: '0 6 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout build scripts
        uses: actions/checkout@v4
      - name: Print env
        run: |
          echo "[GH runner]"
          df -h
          pwd
          ls -la
      - name: Fix workspace permissions
        run: sudo chmod 777 ${{ github.workspace }}
      - name: Login to GHCR
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u c0xc --password-stdin
      - name: Find latest monthly builder image
        id: find_image
        run: |
          LATEST_MONTHLY=$(curl -s -H "Authorization: Bearer ${{ secrets.GHCR_TOKEN }}" \
            "https://ghcr.io/v2/c0xc/xpra-appimage/builder/tags/list" \
            | jq -r '.tags[] | select(startswith("monthly-"))' | sort | tail -n1)
          
          if [ -n "$LATEST_MONTHLY" ]; then
            echo "builder_image=ghcr.io/c0xc/xpra-appimage/builder:$LATEST_MONTHLY" >> $GITHUB_OUTPUT
            echo "Using latest monthly image: $LATEST_MONTHLY"
          else
            echo "builder_image=ghcr.io/c0xc/xpra-appimage/builder:latest" >> $GITHUB_OUTPUT
            echo "No monthly tag found, using :latest"
          fi
      - name: Pull builder image
        run: |
          docker pull ${{ steps.find_image.outputs.builder_image }}
      - name: Run build
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace ${{ steps.find_image.outputs.builder_image }}
          df -h
          pwd
          ls -la
          echo "[GH runner] Build complete"
          ls -ld ${{ github.workspace }}
          ls -lAh ${{ github.workspace }}/build
      - name: Get date
        id: date
        run: |
          echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
      - name: Create Release
        id: create-release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: daily-build-${{ github.run_number }}
          release_name: "Daily Xpra Build [#${{ github.run_number }}] ${{ steps.date.outputs.date }}"
          draft: false
          prerelease: true
      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create-release.outputs.upload_url }}
          asset_path: ${{ github.workspace }}/build/Xpra-x86_64.AppImage
          asset_name: xpra-daily-${{ github.run_number }}.AppImage
          asset_content_type: application/octet-stream
      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: xpra-appimage
          path: ${{ github.workspace }}/build/Xpra-x86_64.AppImage
